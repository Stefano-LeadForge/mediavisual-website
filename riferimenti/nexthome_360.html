<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Home 360 — NextHome Real Estate</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --navy:       #0d2137;
  --navy-deep:  #08161f;
  --silver:     #8a9baa;
  --silver-l:   #c2cdd6;
  --white:      #f6f4f1;
}

html, body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy-deep);
  color: var(--white);
  min-height: 100vh;
}

/* ── NOISE ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 2rem 3.5rem;
  background: rgba(8,22,31,0.6);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.logo-wrap {
  display: flex; align-items: center; gap: 12px;
  text-decoration: none;
}
.logo-icon {
  height: 40px; width: 40px;
  object-fit: contain; flex-shrink: 0;
  mix-blend-mode: screen;
}
.logo-divider {
  width: 1px; height: 32px;
  background: linear-gradient(to bottom, transparent, rgba(194,205,214,0.4), transparent);
}
.logo-text { display: flex; flex-direction: column; gap: 1px; }
.logo-main {
  font-weight: 300; font-size: 12px; letter-spacing: 0.28em;
  text-transform: uppercase; color: var(--white);
}
.logo-sub {
  font-weight: 200; font-size: 8.5px; letter-spacing: 0.38em;
  text-transform: uppercase; color: var(--silver);
}

.nav-links {
  display: flex; gap: 2.5rem; list-style: none;
}
.nav-links a {
  font-size: 11px; font-weight: 400; letter-spacing: 0.18em;
  text-transform: uppercase; color: rgba(246,244,241,0.55);
  text-decoration: none; transition: color 200ms ease;
  position: relative;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -3px; left: 0;
  width: 0; height: 1px; background: var(--silver-l);
  transition: width 250ms ease;
}
.nav-links a:hover { color: var(--white); }
.nav-links a:hover::after { width: 100%; }
.nav-links a.active { color: var(--white); }
.nav-links a.active::after { width: 100%; }

.nav-btn {
  font-size: 10px; font-weight: 500; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--white); text-decoration: none;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(8px);
  padding: 10px 22px;
  transition: background 200ms ease, border-color 200ms ease;
}
.nav-btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.25);
}

/* ── PAGE CONTENT ── */
.page-wrap {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding-top: 7rem;
}

.coming-soon {
  text-align: center;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

.coming-tag {
  font-size: 10px; font-weight: 400; letter-spacing: 0.35em;
  text-transform: uppercase; color: var(--silver);
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-bottom: 2rem;
}
.coming-tag::before, .coming-tag::after {
  content: ''; display: inline-block;
  width: 28px; height: 1px; background: var(--silver);
}

.coming-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(3rem, 6vw, 5.5rem);
  line-height: 1.02; letter-spacing: -0.025em;
  color: var(--white);
  margin-bottom: 1.5rem;
}
.coming-title em { font-style: italic; color: var(--silver-l); }

.coming-sub {
  font-size: 13px; font-weight: 300; line-height: 1.85;
  color: rgba(246,244,241,0.4); letter-spacing: 0.03em;
  max-width: 380px; margin: 0 auto 3rem;
}

.back-btn {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: 10.5px; font-weight: 500; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--navy-deep);
  background: var(--silver-l); text-decoration: none;
  padding: 13px 28px;
  position: relative; overflow: hidden;
  transition: transform 250ms cubic-bezier(0.34,1.56,0.64,1);
}
.back-btn::before {
  content: ''; position: absolute; inset: 0;
  background: var(--white); transform: translateX(-101%);
  transition: transform 350ms cubic-bezier(0.4,0,0.2,1);
}
.back-btn:hover { transform: translateY(-2px); }
.back-btn:hover::before { transform: translateX(0); }
.back-btn span { position: relative; z-index: 1; }
.back-btn .arr {
  position: relative; z-index: 1;
  width: 16px; height: 1px; background: var(--navy-deep);
  display: inline-block;
  transform: rotate(180deg);
  transition: width 250ms ease;
}
.back-btn .arr::after {
  content: ''; position: absolute; right: 0; top: -3px;
  width: 6px; height: 6px;
  border-right: 1px solid var(--navy-deep);
  border-top: 1px solid var(--navy-deep);
  transform: rotate(45deg);
}
.back-btn:hover .arr { width: 24px; }

@media (max-width: 768px) {
  nav { padding: 1.25rem 1.5rem; }
  .nav-links, .nav-btn { display: none; }
}
</style>
</head>
